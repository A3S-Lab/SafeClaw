name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build-dmg:
    name: Build macOS DMG (arm64)
    runs-on: macos-latest

    steps:
      - name: Checkout a3s monorepo
        uses: actions/checkout@v4
        with:
          repository: A3S-Lab/a3s
          submodules: recursive
          path: a3s

      - name: Resolve tag
        id: meta
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: a3s/apps/safeclaw/pnpm-lock.yaml

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: a3s/apps/safeclaw/src-tauri -> target
          cache-on-failure: true

      - name: Install system dependencies
        run: brew install cmake protobuf

      - name: Install frontend dependencies
        working-directory: a3s/apps/safeclaw
        run: pnpm install --frozen-lockfile

      - name: Build DMG (unsigned)
        working-directory: a3s/apps/safeclaw
        env:
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
          ORT_STRATEGY: download
        run: pnpm tauri build --bundles dmg

      - name: Locate DMG
        id: dmg
        working-directory: a3s/apps/safeclaw
        run: |
          DMG_PATH="$(find src-tauri/target/release/bundle/dmg -name '*.dmg' | head -1)"
          echo "path=$DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$DMG_PATH")" >> "$GITHUB_OUTPUT"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: safeclaw-dmg
          path: a3s/apps/safeclaw/${{ steps.dmg.outputs.path }}
          if-no-files-found: error

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-dmg
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      sha256: ${{ steps.checksum.outputs.sha256 }}
      dmg_name: ${{ steps.checksum.outputs.dmg_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: meta
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: safeclaw-dmg
          path: dist

      - name: Compute SHA256
        id: checksum
        run: |
          DMG_PATH="$(find dist -name '*.dmg' | head -1)"
          echo "sha256=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$(basename "$DMG_PATH")" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | grep -v "^${{ steps.meta.outputs.tag }}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            echo "Initial release of SafeClaw desktop app." > /tmp/release-notes.md
          else
            git log "${PREV_TAG}..HEAD" --oneline --no-merges --pretty=format:"- %s" | head -50 > /tmp/release-notes.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          DMG_PATH="$(find dist -name '*.dmg' | head -1)"
          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" "$DMG_PATH" --clobber
          else
            gh release create "$TAG" "$DMG_PATH" \
              --title "SafeClaw $TAG" \
              --notes-file /tmp/release-notes.md
          fi

  update-homebrew-cask:
    name: Update Homebrew Cask
    runs-on: ubuntu-latest
    needs: github-release

    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: A3S-Lab/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Write Cask
        env:
          VERSION: ${{ needs.github-release.outputs.version }}
          TAG: ${{ needs.github-release.outputs.tag }}
          SHA256: ${{ needs.github-release.outputs.sha256 }}
          DMG_NAME: ${{ needs.github-release.outputs.dmg_name }}
        run: |
          mkdir -p homebrew-tap/Casks
          cat > homebrew-tap/Casks/safeclaw.rb << 'RUBY'
          # typed: false
          # frozen_string_literal: true

          cask "safeclaw" do
            version "VERSION_PLACEHOLDER"
            sha256 "SHA256_PLACEHOLDER"

            url "https://github.com/A3S-Lab/SafeClaw/releases/download/TAG_PLACEHOLDER/DMG_NAME_PLACEHOLDER"
            name "SafeClaw"
            desc "Secure personal AI assistant with TEE support"
            homepage "https://github.com/A3S-Lab/SafeClaw"

            depends_on macos: ">= :ventura"

            app "SafeClaw.app"

            zap trash: [
              "~/Library/Application Support/com.a3s.safeclaw",
              "~/Library/Caches/com.a3s.safeclaw",
              "~/Library/Preferences/com.a3s.safeclaw.plist",
              "~/Library/Logs/com.a3s.safeclaw",
            ]
          end
          RUBY
          sed -i \
            -e "s/VERSION_PLACEHOLDER/${VERSION}/" \
            -e "s/SHA256_PLACEHOLDER/${SHA256}/" \
            -e "s/TAG_PLACEHOLDER/${TAG}/" \
            -e "s/DMG_NAME_PLACEHOLDER/${DMG_NAME}/" \
            -e 's/^          //' \
            homebrew-tap/Casks/safeclaw.rb

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/safeclaw.rb
          git diff --cached --quiet || git commit -m "chore: update SafeClaw cask to ${{ needs.github-release.outputs.tag }}"
          git push
